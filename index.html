<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新買醉餐酒館 工作回報系統</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo h1 {
      font-size: 22px;
      color: #1a1a2e;
      font-weight: 700;
      line-height: 1.4;
    }
    .logo p {
      color: #666;
      font-size: 13px;
      margin-top: 6px;
    }
    .logo .icon {
      font-size: 48px;
      margin-bottom: 10px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #444;
      margin-bottom: 6px;
      font-weight: 600;
    }
    select, input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      color: #333;
      background: #fafafa;
      transition: border-color 0.2s;
      margin-bottom: 18px;
      -webkit-appearance: none;
    }
    select:focus, input[type="password"]:focus {
      outline: none;
      border-color: #0f3460;
      background: #fff;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #0f3460, #533483);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.88; }
    .error {
      color: #e74c3c;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      display: none;
    }
    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="icon">🍻</div>
      <h1>新買醉餐酒館</h1>
      <p>員工工作回報系統</p>
    </div>

    <form id="loginForm">
      <label for="nameSelect">選擇姓名</label>
      <select id="nameSelect" required>
        <option value="">── 請選擇你的姓名 ──</option>
        <option>小英</option>
        <option>小明</option>
        <option>阿華</option>
        <option>小美</option>
        <option>阿偉</option>
        <option>小莉</option>
        <option>阿龍</option>
        <option>小芳</option>
      </select>

      <label for="password">登入密碼</label>
      <input type="password" id="password" placeholder="請輸入員工密碼" required>

      <button type="submit">登　入</button>
      <p class="error" id="errorMsg">姓名或密碼錯誤，請重試</p>
    </form>

    <div class="footer">如有問題請聯絡店長</div>
  </div>

  <script>
    const PASS = '1234'; // 統一員工密碼，請與店長確認
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('nameSelect').value;
      const pwd  = document.getElementById('password').value;
      if (!name) { showError('請選擇姓名'); return; }
      if (pwd !== PASS) { showError('密碼錯誤，請重試'); return; }
      sessionStorage.setItem('employeeName', name);
      window.location.href = 'report.html';
    });
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
